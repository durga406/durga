<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Handmade Products - Shop</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #fff8;
    color: #333;
    /* Updated background image direct link */
    background-image: url('https://images.pexels.com/photos/16063775/pexels-photo-16063775.jpeg');
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255, 255, 255, 0.8);
    z-index: 0;
  }
  body > * {
    position: relative;
    z-index: 1;
  }
  nav {
    display: flex;
    justify-content: center;
    background-color: #a0522d;
    padding: 15px 0;
  }
  nav a {
    color: #fff;
    margin: 0 20px;
    text-decoration: none;
    font-weight: bold;
  }
  nav a:hover {
    color: #ffd700;
  }
  .header {
    text-align: center;
    padding: 50px 20px;
    background-color: #ffe4c4cc;
    border-radius: 15px;
    margin: 40px auto 20px auto;
    max-width: 700px;
    box-shadow: 0 0 20px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 3em;
    margin-bottom: 10px;
    color: #8b4513;
  }
  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
  }
  .product-card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    margin: 15px;
    width: 250px;
    overflow: hidden;
    text-align: center;
    transition: transform 0.2s;
  }
  .product-card:hover {
    transform: scale(1.05);
  }
  .product-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
  }
  .product-title {
    font-size: 1.2em;
    margin: 10px 0;
    color: #333;
  }
  .btn {
    display: inline-block;
    background-color: #a0522d;
    color: #fff;
    padding: 10px 20px;
    margin: 15px 0;
    border-radius: 25px;
    text-decoration: none;
    font-weight: bold;
    transition: background 0.3s;
  }
  .btn:hover {
    background-color: #d2691e;
  }
  @media(max-width: 768px) {
    .products {
      flex-direction: column;
      align-items: center;
    }
    .header {
      max-width: 95vw;
      margin: 20px 5px;
    }
  }
</style>
</head>
<body>
<nav>
  <a href="#">Home</a>
  <a href="#">Products</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>
<div class="header">
  <h1>Welcome to Handmade Creations</h1>
  <p>Unique, handcrafted products just for you!</p>
  <a href="login.html" class="btn">Login / Register</a>
</div>
<div class="products">
  <div class="product-card">
    <img src="https://images.unsplash.com/photo-1607296601998-9faed4a3f1e4?ixlib=rb-4.0.4&auto=format&fit=crop&w=600&q=80" class="product-img" alt="Handmade Vase" />
    <div class="product-title">Handmade Vase</div>
  </div>
  <div class="product-card">
    <img src="https://images.unsplash.com/photo-1610031610494-4f9fbc6e4b0f?ixlib=rb-4.0.4&auto=format&fit=crop&w=600&q=80" class="product-img" alt="Knitted Scarf" />
    <div class="product-title">Knitted Scarf</div>
  </div>
</div>
</body>
</html>
